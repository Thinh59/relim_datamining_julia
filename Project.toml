# Project environment cho đồ án RELIM (Frequent Itemset Mining).
# Đây là các file đặc tả dependencies của Julia
# Cài đặt và chạy:

#   julia --project=. -e 'using Pkg; Pkg.instantiate()'
#   julia --project=. src/main.jl --input data/toy/example_basic.txt --minsup 0.5
#   julia --project=. tests/test_correctness.jl

[deps]
BenchmarkTools = "6e4b80f9-dd63-53aa-95a3-0cdb28fa8baf"
Random = "9a3f8284-a2c9-5f02-9a11-845980a1fd5c"
Test = "8dfed614-e22c-5e08-85e1-65c5234f0b40"

Combinatorics = "861a8166-3701-5b0c-9a16-15d98fcdc6aa"
StatsBase = "2913bbd2-ae8a-5f71-8c99-4fb6c76f3a91"


[compat]
julia = "1.9"
BenchmarkTools = "1"
